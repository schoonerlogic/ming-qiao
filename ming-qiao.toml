# Project identifier for NATS subject routing
project = "mingqiao"

mode = "passive"
data_dir = "data"
port = 7777

[nats]
enabled = true
url = "nats://localhost:4222"
# Security P0 (RA-003): NKey auth active
auth_mode = "nkey"
nkey_seed_file = "/Users/proteus/astralmaris/ming-qiao/main/config/nkeys/aleph.nk"

[database]
url = "ws://localhost:8000"
# Security P0: credentials now loaded from env vars (MINGQIAO_DB_USERNAME, MINGQIAO_DB_PASSWORD)
# Run scripts/security/setup-surreal-creds.sh to create database-scoped credentials
# Then: source config/surreal-creds.env
# Auth level: "root" (legacy), "namespace", or "database" (recommended)
auth_level = "database"

# ============================================================================
# Security P0 — API Authentication (disabled until setup scripts are run)
# ============================================================================
# To enable:
#   1. Run scripts/security/generate-agent-keys.sh
#   2. Set enabled = true below
#   3. Restart ming-qiao
[auth]
enabled = true
token_file = "config/agent-tokens.json"
keyring_file = "config/council-keyring.json"

# ============================================================================
# Watchers — real-time event dispatch
# ============================================================================

# Laozi-Jung: full event stream for witnessing (existing)
[[watchers]]
agent = "laozi-jung"
role = "observer"
subjects = ["am.events.mingqiao"]

[watchers.action]
type = "file_append"
path = "/Users/proteus/astralmaris/echoessence/merlin/observations/stream.jsonl"

# ============================================================================
# Per-agent notification watchers — message delivery without human relay
# ============================================================================

# Aleph notification
[[watchers]]
agent = "aleph-notify"
role = "observer"
subjects = ["am.events.mingqiao"]

[watchers.filter]
event_types = ["message_sent"]
recipients = ["aleph", "council", "all"]

[watchers.action]
type = "file_append"
path = "/Users/proteus/astralmaris/ming-qiao/notifications/aleph.jsonl"

