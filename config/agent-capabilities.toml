# agent-capabilities.toml — Runtime capability declarations for Council agents
#
# The awakener reads this to determine how to notify each agent.
# Adding a new agent requires one entry here, not a code change.
#
# Fields:
#   worktree          - Primary worktree path for the agent
#   all_worktrees     - All worktree paths (space-separated) for session detection
#   runtime           - CLI binary name (claude, kimi, ollama, etc.)
#   headless_capable  - Can the runtime be invoked with --print for background handling?
#   pending_file      - Write PENDING_MESSAGES.md to worktree? (belt-and-suspenders for all)
#   webhook_url       - HTTP endpoint for real-time notification (Phase C — future)

[agents.aleph]
worktree = "/Users/proteus/astralmaris/ming-qiao/aleph"
all_worktrees = "/Users/proteus/astralmaris/ming-qiao/aleph /Users/proteus/astralmaris/astral-forge/aleph /Users/proteus/astralmaris/inference-kitchen/aleph"
runtime = "claude"
headless_capable = true
pending_file = true
webhook_url = ""

