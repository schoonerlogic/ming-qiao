[package]
name = "ming-qiao"
version = "0.1.0"
edition = "2021"
description = "Communication bridge for the Council of Wizards"
license = "MIT"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v7", "serde"] }
tokio = { version = "1", features = ["full"] }
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# HTTP server (Thales gateway)
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace", "fs"] }

# Configuration
toml = "0.8"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
